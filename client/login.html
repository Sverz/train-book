<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вхід</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>

<body class="bg-dark text-light d-flex align-items-center justify-content-center min-vh-100">

  <div style="width:100%;max-width:360px;padding:1rem">
    <p class="text-secondary mb-4 small">Розклад Рейсів</p>

    <div class="alert alert-danger py-2 small d-none" id="err"></div>
    <div class="alert alert-success py-2 small d-none" id="success"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label small text-secondary">Email</label>
        <input type="email" class="form-control form-control-sm bg-dark text-light border-secondary" id="loginEmail"
          placeholder="admin@gmail.com" required />
      </div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Пароль</label>
        <input type="password" class="form-control form-control-sm bg-dark text-light border-secondary"
          id="loginPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-warning btn-sm w-100 fw-semibold" id="loginBtn">Увійти</button>
      <p class="text-center text-secondary small mt-3 mb-0">
        Немає акаунту?
        <a href="#" class="text-warning text-decoration-none" id="toRegister">Зареєструватись</a>
      </p>
    </form>

    <form id="registerForm" class="d-none">
      <div class="mb-3">
        <label class="form-label small text-secondary">Email</label>
        <input type="email" class="form-control form-control-sm bg-dark text-light border-secondary" id="regEmail"
          placeholder="ivan@gmail.com" required />
      </div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Пароль</label>
        <input type="password" class="form-control form-control-sm bg-dark text-light border-secondary" id="regPassword"
          placeholder="••••••••" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-warning btn-sm w-100 fw-semibold" id="registerBtn">Зареєструватись</button>
      <p class="text-center text-secondary small mt-3 mb-0">
        Вже є акаунт?
        <a href="#" class="text-warning text-decoration-none" id="toLogin">Увійти</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { API_URL } from './js/config.js';

    const err = document.getElementById('err');
    const success = document.getElementById('success');

    function showErr(msg) {
      success.classList.add('d-none');
      err.textContent = msg;
      err.classList.remove('d-none');
    }

    function showSuccess(msg) {
      err.classList.add('d-none');
      success.textContent = msg;
      success.classList.remove('d-none');
    }

    function hideAlerts() {
      err.classList.add('d-none');
      success.classList.add('d-none');
    }

    document.getElementById('toRegister').addEventListener('click', (e) => {
      e.preventDefault();
      hideAlerts();
      document.getElementById('loginForm').classList.add('d-none');
      document.getElementById('registerForm').classList.remove('d-none');
    });

    document.getElementById('toLogin').addEventListener('click', (e) => {
      e.preventDefault();
      hideAlerts();
      document.getElementById('registerForm').classList.add('d-none');
      document.getElementById('loginForm').classList.remove('d-none');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlerts();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Перевірка...';

      try {
        const res = await fetch(API_URL + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value.trim(),
            password: document.getElementById('loginPassword').value,
          }),
        });
        if (!res.ok) throw new Error(res.status === 401 ? 'Невірний email або пароль' : 'Помилка сервера');
        const { access_token } = await res.json();
        const payload = JSON.parse(atob(access_token.split('.')[1]));
        localStorage.setItem('token', access_token);
        localStorage.setItem('userRole', payload.role);
        window.location.href = 'index.html';
      } catch (e) {
        showErr(e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Увійти';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlerts();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Реєстрація...';

      try {
        const res = await fetch(API_URL + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('regEmail').value.trim(),
            password: document.getElementById('regPassword').value,
          }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || 'Помилка реєстрації');
        }
        showSuccess('Акаунт створено! Тепер увійдіть.');
        document.getElementById('registerForm').classList.add('d-none');
        document.getElementById('loginForm').classList.remove('d-none');
        document.getElementById('loginEmail').value = document.getElementById('regEmail').value;
      } catch (e) {
        showErr(e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Зареєструватись';
      }
    });
  </script>
</body>

</html>
