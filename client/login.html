<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вхід</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>

<body class="bg-dark text-light d-flex align-items-center justify-content-center min-vh-100">

  <div style="width:100%;max-width:360px;padding:1rem">
    <p class="text-secondary mb-4 small">Розклад Рейсів</p>

    <div class="alert alert-danger py-2 small d-none" id="err"></div>

    <form id="form">
      <div class="mb-3">
        <label class="form-label small text-secondary">Email</label>
        <input type="email" class="form-control form-control-sm bg-dark text-light border-secondary" id="email"
          placeholder="admin@gmail.com" required />
      </div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Пароль</label>
        <input type="password" class="form-control form-control-sm bg-dark text-light border-secondary" id="password"
          placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-warning btn-sm w-100 fw-semibold" id="btn">Увійти</button>
    </form>
  </div>

  <script type="module">
    import { API_URL } from './js/config.js';

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');
      err.classList.add('d-none');
      btn.disabled = true;
      btn.textContent = 'Перевірка...';

      try {
        const res = await fetch(API_URL + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        if (!res.ok) throw new Error(res.status === 401 ? 'Невірний email або пароль' : 'Помилка сервера');
        const { access_token } = await res.json();
        const payload = JSON.parse(atob(access_token.split('.')[1]));
        localStorage.setItem('token', access_token);
        localStorage.setItem('userRole', payload.role);
        window.location.href = 'index.html';
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Увійти';
      }
    });
  </script>
</body>

</html>
